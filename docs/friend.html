<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>הוספת חבר — טופי</title>
<style>
  body{margin:0;font-family:-apple-system,"Heebo",Arial,sans-serif;color:#fff;text-align:center;
       background:linear-gradient(160deg,#5E60CE,#48BFE3);min-height:100vh;display:grid;place-items:center}
  .card{padding:36px 24px;max-width:420px}
  h1{font-size:44px;margin:0 0 6px;color:#FFD23F}
  p{font-size:18px;opacity:.95;line-height:1.6}
  .code{font-size:40px;font-weight:800;letter-spacing:8px;background:rgba(255,255,255,.15);
        border-radius:16px;padding:14px 18px;margin:14px 0;display:inline-block}
  .btn{display:inline-block;margin-top:10px;font-weight:800;background:#000;color:#fff;
       padding:14px 26px;border-radius:14px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div style="font-size:64px">🤝</div>
    <h1>טופי</h1>
    <p>חבר רוצה להתחבר אליכם!</p>
    <div id="codeBox" style="display:none">
      <p style="opacity:.9;font-size:15px">פִּתחו את טופי → לוח החברים 🏆 → הוספת חבר, והקלידו את הקוד:</p>
      <div class="code" id="code">······</div>
    </div>
    <p style="opacity:.85;font-size:15px">אם טופי מותקן, היא תיפתח אוטומטית. אם לא — התקינו אותה ואז הקלידו את הקוד למעלה.</p>
    <a class="btn" id="openBtn" href="#">פִּתחו את טופי</a>
  </div>
  <script>
    var f = new URLSearchParams(location.search).get('f');
    if (f) {
      document.getElementById('code').textContent = f;
      document.getElementById('codeBox').style.display = 'block';
      var deep = 'tofy://friend?f=' + encodeURIComponent(f);
      document.getElementById('openBtn').href = deep;
      // Try to bounce into the app automatically.
      setTimeout(function(){ location.href = deep; }, 350);
    }
  </script>
</body>
</html>
